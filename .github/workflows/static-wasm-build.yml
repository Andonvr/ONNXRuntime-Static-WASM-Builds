name: ONNX Runtime Static Wasm Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── 1. Discover which emsdk / onnx combos still need a release ──
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_builds: ${{ steps.set-matrix.outputs.has_builds }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover unreleased build combinations
        id: set-matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch all existing release tags (up to 1000)
          existing_tags=$(gh release list --limit 1000 --json tagName -q '.[].tagName' 2>/dev/null || true)

          matrix_entries=()

          for script in buildscripts/em-*/onnx-*.sh; do
            [ -f "$script" ] || continue

            emsdk_version=$(echo "$script" | sed -n 's|buildscripts/em-\([^/]*\)/onnx-.*|\1|p')
            onnx_version=$(echo "$script" | sed -n 's|.*/onnx-\(.*\)\.sh|\1|p')
            tag="emsdk-${emsdk_version}-onnx-${onnx_version}"

            if echo "$existing_tags" | grep -qx "$tag"; then
              echo "Skipping ${tag} (already released)"
            else
              echo "Will build ${tag}"
              matrix_entries+=("{\"emsdk_version\":\"${emsdk_version}\",\"onnx_version\":\"${onnx_version}\",\"script\":\"${script}\",\"tag\":\"${tag}\"}")
            fi
          done

          if [ ${#matrix_entries[@]} -eq 0 ]; then
            echo "No new builds needed"
            echo "has_builds=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            joined=$(IFS=,; echo "${matrix_entries[*]}")
            echo "matrix={\"include\":[${joined}]}" >> "$GITHUB_OUTPUT"
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Build each unreleased combination in parallel ──
  build:
    needs: discover
    if: needs.discover.outputs.has_builds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    name: Build ${{ matrix.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone onnxruntime
        run: |
          git clone --recurse-submodules --branch ${{ matrix.onnx_version }} \
            https://github.com/microsoft/onnxruntime.git onnxruntime

      - name: Checkout correct emsdk version
        run: |
          cd onnxruntime/cmake/external/emsdk
          git checkout tags/${{ matrix.emsdk_version }}

      - name: Run build script
        env:
          EMSDK_VERSION: ${{ matrix.emsdk_version }}
          ONNX_VERSION: ${{ matrix.onnx_version }}
          ARTIFACT_DIR: onnx-${{ matrix.onnx_version }}-emsdk-${{ matrix.emsdk_version }}
        run: |
          mkdir -p output "${ARTIFACT_DIR}"
          chmod +x "${{ matrix.script }}"
          ./${{ matrix.script }}
          zip -r "output/${ARTIFACT_DIR}.zip" "${ARTIFACT_DIR}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tag }}
          path: output/*.zip

  # ── 3. Create a GitHub release for each newly-built combination ──
  release:
    needs: [discover, build]
    if: "!cancelled() && needs.discover.outputs.has_builds == 'true'"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    name: Release ${{ matrix.tag }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.tag }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: ONNX ${{ matrix.onnx_version }} – emsdk ${{ matrix.emsdk_version }}
          files: '*.zip'
